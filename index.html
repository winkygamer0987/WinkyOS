        function initPoolEngine() {
            pWidth = window.innerWidth; pHeight = window.innerHeight;
            poolCanvas.width = pWidth; poolCanvas.height = pHeight;
            pTextCanvas.width = pWidth; pTextCanvas.height = pHeight;

            for(let i = -radius; i < radius; i++) {
                for(let j = -radius; j < radius; j++) {

                    if (col >= 0 && col < cols && row >= 0 && row < rows) {

                }
            }
            pCtx.putImageData(outData, 0, 0);
            let temp = buffer1; buffer1 = buffer2; buffer2 = temp;
        }

            currentInflation += (targetInflation - currentInflation) * (isInside ? 0.08 : 0.15);

            const followSpeed = isInside ? 0.12 : (currentInflation > 0.01 ? 0.25 : 1.0);
            holePos.x += (mouse.x - holePos.x) * followSpeed;
            holePos.y += (mouse.y - holePos.y) * followSpeed;

            if (currentInflation < 0.0001 && !isInside) {
                wCtx.drawImage(wTextCanvas, 0, 0);
                return;
            }

            const iSq = currentInflation * currentInflation;
            const lineLife = isInside ? Math.max(0, 1 - currentInflation * 1.4) : 0;
            const vScale = Math.max(iSq * iSq, 0.0001);
            const vRadius = voidRadius * currentInflation;

            for (let i = 0; i < wSize; i++) {
                const x = i % wWidth; const y = (i / wWidth) | 0;
                const dx = x - holePos.x; const dy = y - holePos.y;
                const distCheck = Math.sqrt(dx * dx + (dy / vScale) * (dy / vScale));
                const isLine = isInside && lineLife > 0 && Math.abs(dy) < (1.2 + lineLife * 2) && Math.abs(dx) < (wWidth * 0.35 * lineLife);

                if (distCheck < vRadius || isLine) {
                    outputPixels[i] = 0xFF050505; continue;
                }

                const rawDist = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx);
                const pull = Math.exp(-(Math.abs(dx) / 450) - (Math.abs(dy) / 30)) * currentInflation;
                const lensWarp = (voidRadius * 2.2) / Math.max(rawDist, 15) * currentInflation;

                const floatFx = x - Math.cos(angle) * (lensWarp * 45) - (dx * 0.3 * pull * currentInflation);
                const floatFy = y - Math.sin(angle) * (lensWarp * 45) + ((dy > 0 ? 1 : -1) * (20 * lineLife) * pull);

                const fx = (floatFx + 0.5) | 0; const fy = (floatFy + 0.5) | 0;
                
                if (fx >= 0 && fx < wWidth && fy >= 0 && fy < wHeight) {
                    outputPixels[i] = sourceBuffer[fy * wWidth + fx];
                } else {
                    outputPixels[i] = 0xFF000000;
                }
            }
            wCtx.putImageData(outputData, 0, 0);
        }

        /* ========================================================================
            CORE ENGINE LOOP RUNNER, MATRIX CHRONOMETER & OS LOGIC
            ======================================================================== */
        function updateSystemTimeMetrics() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            
            if (timeFormat === '12h') {
                let displayHours = hours % 12;
                displayHours = displayHours ? displayHours : 12; 
                const ampm = hours >= 12 ? 'PM' : 'AM';
                document.getElementById('clock').innerText = `${displayHours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')} ${ampm}`;
            } else {
                document.getElementById('clock').innerText = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            
            const totalPassedSeconds = (hours * 3600) + (minutes * 60) + seconds;
            const totalDaySeconds = 86400; 
            const dayCompletionRatio = totalPassedSeconds / totalDaySeconds;
            
            const circumference = 113.097;
            const offset = circumference - (dayCompletionRatio * circumference);
            
            document.getElementById('chrono-progress-ring').style.strokeDashoffset = offset;
            
            if (timeFormat === '12h') {
                let hudHours = hours % 12;
                hudHours = hudHours ? hudHours : 12;
                const marker = hours >= 12 ? 'p' : 'a';
                document.getElementById('chrono-time-display').innerText = `${hudHours.toString().padStart(2, '0')}${marker}`;
            } else {
                document.getElementById('chrono-time-display').innerText = `${hours.toString().padStart(2, '0')}h`;
            }
            
            const daysMap = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
            document.getElementById('chrono-day-display').innerText = daysMap[now.getDay()];
        }

        function setTimeFormat(format) {
            timeFormat = format;
            localStorage.setItem('aura_time_format', format);
            
            document.querySelectorAll('.setting-toggle-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-format') === format) btn.classList.add('active');
            });
            
            updateSystemTimeMetrics();
        }

        function switchBackgroundEngine(engineName) {
            activeEngine = engineName;
            localStorage.setItem('aura_engine', engineName);

            document.querySelectorAll('.bg-canvas').forEach(canv => canv.classList.remove('active'));
            document.querySelectorAll('.bg-engine-btn').forEach(btn => btn.classList.remove('active'));

            if(engineName === 'pool') {
                document.getElementById('poolCanvas').classList.add('active');
                const btn = document.getElementById('btn-eng-pool');
                if(btn) btn.classList.add('active');
            } else {
                document.getElementById('warpCanvas').classList.add('active');
                const btn = document.getElementById('btn-eng-warp');
                if(btn) btn.classList.add('active');
            }
        }

        function animateOS() {
            if (activeEngine === 'pool') {
                runPoolPhysics();
            } else if (activeEngine === 'warp') {
                runWarpPhysics();
            }
            requestAnimationFrame(animateOS);
        }

        function initOS() {
            initPoolEngine();
            initWarpEngine();

            let savedEngine = localStorage.getItem('aura_engine');
            if (!savedEngine || savedEngine === "null" || savedEngine === "undefined") {
                savedEngine = 'pool';
            }
            
            const savedColor = localStorage.getItem('aura_accent') || '#00d2ff';
            timeFormat = localStorage.getItem('aura_time_format') || '24h';
            
            switchBackgroundEngine(savedEngine);
            setAccent(savedColor);

            updateSystemTimeMetrics();
            setInterval(updateSystemTimeMetrics, 1000);

            requestAnimationFrame(animateOS);
        }

        window.addEventListener('resize', () => {
            initPoolEngine();
            initWarpEngine();
        });

        function getDevAvatarUrl(key) {
            const saved = localStorage.getItem(`aura_avatar_${key}`);
            if (saved) return saved;
            return DEFAULT_PFP[key] || '';
        }

        function generateDesktopEnvironment() {
            const dockApps = document.getElementById('dock-apps');
            dockApps.innerHTML = ''; 

            APP_REGISTRY.forEach(app => {
                if (app.devOnly && !isDev) return;

                const node = document.createElement('div');
                node.className = 'dock-icon';
                node.title = app.label;
                
                if (app.type === 'core') {
                    node.setAttribute('onclick', `spawn('${app.name}')`);
                } else {
                    node.setAttribute('onclick', `spawnProxy('${app.name}', '${app.url}')`);
                }

                node.innerHTML = app.icon;
                dockApps.appendChild(node);
            });
        }

        function authenticate() {
            const rawInput = document.getElementById('pass-input').value;
            const inputVal = rawInput.toUpperCase().trim();
            
            if (DEV_KEYS[inputVal]) {
                activeUserKey = DEV_KEYS[inputVal]; 
                isDev = true;
                document.getElementById('user-display').innerText = activeUserKey;
                document.getElementById('pfp-accent').style.cursor = 'pointer';
                document.getElementById('pfp-accent').style.backgroundImage = `url('${getDevAvatarUrl(activeUserKey)}')`;

                generateDesktopEnvironment();
                unlockOS();
            } else if (inputVal === 'WINKYGAMER098') {
                isDev = true;
                activeUserKey = 'winkygamer098';
                document.getElementById('user-display').innerText = 'WINKYGAMER098';
                document.getElementById('pfp-accent').style.cursor = 'default';
                document.getElementById('pfp-accent').style.backgroundImage = `none`;
                
                generateDesktopEnvironment();
                unlockOS();
            } else if (inputVal === 'WINKY') {
                isDev = false;              
            
                let winkyId = sessionStorage.getItem('aura_winky_id');
                if (!winkyId) {
                    let nextNum = parseInt(localStorage.getItem('aura_next_winky_num') || '1');
                    if(nextNum > 13) nextNum = 1; 
                    winkyId = `winky_${nextNum}`;
                    sessionStorage.setItem('aura_winky_id', winkyId);
                    localStorage.setItem('aura_next_winky_num', nextNum + 1);
                }
                
                activeUserKey = winkyId;
                document.getElementById('user-display').innerText = winkyId.toUpperCase();
                document.getElementById('pfp-accent').style.cursor = 'default';
                document.getElementById('pfp-accent').style.backgroundImage = `none`;
                
                generateDesktopEnvironment();
                unlockOS();
            } else {
                const err = document.getElementById('login-err');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 2000);
            }
        }

        function unlockOS() {
            document.getElementById('gatekeeper').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('desktop').style.opacity = '1';
                document.getElementById('desktop').style.pointerEvents = 'all';
                document.getElementById('taskbar').style.transform = 'translateX(-50%) translateY(0)';
            }, 1000);
        }

        function triggerPfpUpload() {
            if (isDev) {
                document.getElementById('pfp-file-input').click();
            } else {
                alert('WRITE_ACCESS_DENIED: winky_ACCOUNTS_CANNOT_ALTER_AVATAR');
            }
        }

        function uploadAvatar(input) {
            if (isDev && input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgBase64 = e.target.result;
                    
                    document.getElementById('pfp-accent').style.backgroundImage = `url(${imgBase64})`;
                    localStorage.setItem(`aura_avatar_${activeUserKey}`, imgBase64);
                    
                    const b2PfpEl = document.getElementById('credits-pfp-b2');
                    const c3PfpEl = document.getElementById('credits-pfp-c3');
                    if (activeUserKey === 'Hiring' && b2PfpEl) b2PfpEl.style.backgroundImage = `url(${imgBase64})`;
                    if (activeUserKey === 'winky_is_tuff' && c3PfpEl) c3PfpEl.style.backgroundImage = `url(${imgBase64})`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function refreshWin(id) {
            const win = document.getElementById(id);
            if (win) {
                const iframe = win.querySelector('iframe');
                if (iframe) {
                    iframe.src = iframe.src;
                }
            }
        }

        function spawnProxy(name, url) {
            const lowerName = name.toLowerCase();
            const id = 'win-' + lowerName;
            if (document.getElementById(id)) { focusWin(id); return; }
            const win = document.createElement('div');
            win.id = id; win.className = 'win';
            win.style.display = 'flex';
            win.style.width = '850px'; win.style.height = '550px';
            win.style.left = '100px'; win.style.top = '80px';
            win.style.zIndex = ++zIdx;
            win.innerHTML = `
                <div class="win-bar" onmousedown="dragStart(event, '${id}')">
                    <span style="font-size:0.7rem; font-weight:700; letter-spacing:1px;">UPLINK::${name.toUpperCase()}</span>
                    <div class="win-ctrls">
                        <button class="win-btn btn-max" onclick="maxWin('${id}')"></button>
                        <button class="win-btn btn-refresh" onclick="refreshWin('${id}')"></button>
                        <button class="win-btn btn-close" onclick="document.getElementById('${id}').remove()"></button>
                    </div>
                </div>
                <div class="win-body"><iframe src="${url}"></iframe></div>
            `;
            document.body.appendChild(win);
        }

        function spawn(app) {
            const id = 'win-' + app;
            if (document.getElementById(id)) { focusWin(id); return; }
            const win = document.createElement('div');
            win.id = id; win.className = 'win';
            win.style.display = 'flex';
            win.style.width = '420px'; win.style.height = '425px';
            win.style.left = '200px'; win.style.top = '150px';
            win.style.zIndex = ++zIdx;

            let body = '';
            let ctrlButtons = '';
            
            if (app === 'settings') {
                ctrlButtons = `<button class="win-btn btn-close" onclick="document.getElementById('${id}').remove()"></button>`;
                body = `<div style="padding:22px;">
                    <p style="font-size:0.65rem; opacity:0.5; margin-bottom:8px; letter-spacing:1px;">CORE ENGINE MATRIX</p>
                    <div class="bg-scroll-area">
                        <button id="btn-eng-pool" class="bg-engine-btn ${activeEngine==='pool'?'active':''}" onclick="switchBackgroundEngine('pool')">
                            <strong>Submerged</strong><br><span style="opacity:0.6;font-size:0.65rem;">Ultra-fidelity discrete water simulation</span>
                        </button>
                        <button id="btn-eng-warp" class="bg-engine-btn ${activeEngine==='warp'?'active':''}" onclick="switchBackgroundEngine('warp')">
                            <strong>Warp</strong><br><span style="opacity:0.6;font-size:0.65rem;">Bilinear viewport grav-pull matrix</span>
                        </button>
                    </div>
                    
                    <div style="margin-top:16px;">
                        <p style="font-size:0.65rem; opacity:0.5; margin-bottom:8px; letter-spacing:1px;">TIME_FORMAT_MATRIX</p>
                        <div class="setting-toggle-row">
                            <button class="setting-toggle-btn ${timeFormat==='24h'?'active':''}" data-format="24h" onclick="setTimeFormat('24h')">MILITARY (24H)</button>
                            <button class="setting-toggle-btn ${timeFormat==='12h'?'active':''}" data-format="12h" onclick="setTimeFormat('12h')">STANDARD (12H)</button>
                        </div>
                    </div>

                    <div style="margin-top:16px;">
                        <label style="font-size:0.65rem; opacity:0.5; letter-spacing:1px;">ACCENT_SYNC</label><br>
                        <input type="color" value="${localStorage.getItem('aura_accent') || '#00d2ff'}" onchange="setAccent(this.value)" style="width:100%; height:28px; background:none; border:none; cursor:pointer; margin-top:5px;">
                    </div>
                </div>`;
            } else if (app === 'credits') {
                ctrlButtons = `<button class="win-btn btn-close" onclick="document.getElementById('${id}').remove()"></button>`;
                
                const omieAvatar = getDevAvatarUrl('');
                const balisticAvatar = getDevAvatarUrl('winky_is_tuff');
                
                body = `<div class="credits-container">
                    <div class="credits-header">Devs / Creators</div>
                    <div class="creator-row">
                        <div id="credits-pfp-b2" class="creator-pfp" style="background-image: url('${omieAvatar}');"></div>
                        <div class="creator-name">HIRING</div>
                    </div>
                    <div class="creator-row">
                        <div id="credits-pfp-c3" class="creator-pfp" style="background-image: url('${balisticAvatar}');"></div>
                        <div class="creator-name">winky_is_tuff</div>
                    </div>
                </div>`;
            } else {
                ctrlButtons = `
                    <button class="win-btn btn-refresh" onclick="refreshWin('${id}')"></button>
                    <button class="win-btn btn-close" onclick="document.getElementById('${id}').remove()"></button>
                `;
            }

            win.innerHTML = 
                `<div class="win-bar" onmousedown="dragStart(event, '${id}')">
                    <span style="font-size:0.7rem; font-weight:700;">${app.toUpperCase()}</span>
                    <div class="win-ctrls">${ctrlButtons}</div>
                </div>
                <div class="win-body">${body}</div>`
            ;
            document.body.appendChild(win);
        }

        function setAccent(color) {
            document.documentElement.style.setProperty('--accent', color);
            localStorage.setItem('aura_accent', color);
        }

        function dragStart(e, id) {
            const el = document.getElementById(id);
            focusWin(id);
            if (el.classList.contains('maximized')) return;
            let sx = e.clientX - el.offsetLeft;
            let sy = e.clientY - el.offsetTop;
            const move = (ev) => { el.style.left = (ev.clientX - sx) + 'px'; el.style.top = (ev.clientY - sy) + 'px'; };
            const stop = () => window.removeEventListener('mousemove', move);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
        }

        function maxWin(id) { document.getElementById(id).classList.toggle('maximized'); }
        function focusWin(id) { document.getElementById(id).style.zIndex = ++zIdx; }

        function filterApps() {
            let q = document.querySelector('.search-bar').value.toLowerCase();
            document.querySelectorAll('.dock-icon').forEach(node => {
                node.style.display = node.title.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }
    </script>
</body>
