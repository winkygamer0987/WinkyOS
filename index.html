<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.4);
            --bg-void: #020408;
            --glass: rgba(10, 12, 18, 0.9);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Comfortaa', cursive; cursor: default; }
        
        body { 
            background: #000;
            color: #fff; height: 100vh; overflow: hidden;
        }

        input, textarea, .win-body, .chrono-text, .creator-name {
            cursor: text;
            user-select: text;
            -webkit-user-select: text;
        }

        /* --- BACKGROUND CANVAS ARCHITECTURE --- */
        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        .bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }
        .bg-canvas.active {
            display: block;
        }

        /* --- DESKTOP CORE HUD BACKGROUND MATRIX --- */
        #desktop-hud-container {
            position: fixed;
            top: 0;
            bottom: 0;
            right: 40px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            z-index: 2;
            pointer-events: none;
        }

        .chrono-background-hud {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(5, 8, 15, 0.25);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            animation: hudPulse 4s ease-in-out infinite alternate;
        }

        @keyframes hudPulse {
            0% { transform: scale(1); opacity: 0.85; }
            100% { transform: scale(1.02); opacity: 0.95; box-shadow: 0 25px 60px rgba(0, 210, 255, 0.05); }
        }

        .chrono-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .chrono-bg { fill: none; stroke: rgba(255, 255, 255, 0.04); stroke-width: 2.5px; }
        .chrono-progress { 
            fill: none; 
            stroke: var(--accent); 
            stroke-width: 3px; 
            stroke-dasharray: 113; 
            stroke-dashoffset: 113; 
            stroke-linecap: round; 
            transition: stroke-dashoffset 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0px 0px 6px var(--accent-glow));
        }
        
        .chrono-text { 
            position: absolute; 
            font-family: 'JetBrains Mono', monospace; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            line-height: 1.1;
        }
        .chrono-time { 
            font-size: 1.7rem; 
            font-weight: 700; 
            color: #fff; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
            letter-spacing: -0.5px;
        }
        .chrono-day { 
            font-size: 0.75rem; 
            color: var(--accent); 
            letter-spacing: 2px; 
            margin-top: 4px; 
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        /* --- SECURITY CHECKPOINT --- */
        #gatekeeper {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #0a101a 0%, #000 100%);
            z-index: 500000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }

        .vault-card {
            width: 350px; padding: 40px; background: rgba(255,255,255,0.02);
            border: 1px solid var(--border); border-radius: 30px; backdrop-filter: blur(20px);
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: vaultFloat 3s ease-in-out infinite;
        }

        @keyframes vaultFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .vault-input {
            width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px;
            border: 1px solid var(--border); background: rgba(255,255,255,0.05);
            color: var(--accent); font-family: 'JetBrains Mono'; text-align: center;
            outline: none; transition: 0.3s; font-size: 1rem;
            text-transform: uppercase;
        }
        .vault-input::placeholder { text-transform: none; }
        .vault-input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .vault-btn {
            width: 100%; padding: 14px; border-radius: 12px;
            border: none; background: var(--accent); color: #000;
            font-weight: 700; cursor: pointer; transition: 0.3s; letter-spacing: 1px;
        }
        .vault-btn:hover { transform: scale(1.03); box-shadow: 0 0 25px var(--accent-glow); }

        /* --- DESKTOP LAYER --- */
        #desktop {
            position: absolute; inset: 0; z-index: 3; opacity: 0; pointer-events: none; transition: 1s;
            display: none; 
        }

        /* --- WINDOWS --- */
        .win {
            position: absolute; min-width: 400px; min-height: 300px;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 24px; backdrop-filter: blur(40px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
            display: none; flex-direction: column; overflow: hidden; z-index: 100; pointer-events: all;

        .win.maximized { inset: 10px !important; width: calc(100% - 20px) !important; height: calc(100% - 100px) !important; border-radius: 12px; }

        .win-bar {
            padding: 15px 20px; background: rgba(255,255,255,0.03);
            display: flex; justify-content: space-between; align-items: center; cursor: move; border-bottom: 1px solid var(--border);
        }
        .win-ctrls { display: flex; gap: 10px; }
        .win-btn { width: 14px; height: 14px; border-radius: 50%; border: none; cursor: pointer; }
        .btn-close { background: #ff5f56; }
        .btn-max { background: #27c93f; }
        .btn-refresh { background: #ffbd2e; }

        .win-body { flex-grow: 1; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* --- MACBOOK STYLE DOCK & ICONS --- */
        #taskbar {
            position: fixed; 
            bottom: 15px; 
            left: 50%; 
            transform: translateX(-50%) translateY(150px);
            height: 75px; 
            width: max-content; 
            background: rgba(20, 25, 35, 0.4); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 0 20px; 
            z-index: 9999; 
            gap: 15px;
            transition: transform 0.8s cubic-bezier(0,1,0,1); 
            pointer-events: all;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .dock-icon {
            width: 48px; height: 48px; 
            border-radius: 14px; 
            background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
            border: 1px solid var(--border); 
            font-size: 1.5rem;
            cursor: pointer; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .dock-icon:hover {
            transform: translateY(-12px) scale(1.15);
            background: rgba(255,255,255,0.15); 
            border-color: var(--accent);
        }

        .weather-widget {
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
            width: 48px; height: 48px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .weather-widget:hover {
            transform: translateY(-12px) scale(1.15);
            background: rgba(255,255,255,0.15); 
            border-color: var(--accent);
        }

        .profile-trigger {
            display: flex; align-items: center; gap: 12px; padding: 8px 5px; border-radius: 12px; margin-left: auto;
        }
        .pfp-circle { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--accent); background: #111; cursor: pointer; background-size: cover; background-position: center; }

        .bg-scroll-area { 
            display: flex; flex-direction: column; gap: 10px; 
            max-height: 160px; overflow-y: auto; padding-right: 5px;
        }
        .bg-scroll-area::-webkit-scrollbar { width: 4px; }
        .bg-scroll-area::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        .bg-engine-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: #fff; padding: 12px; border-radius: 10px; text-align: left;
            font-size: 0.75rem; cursor: pointer; transition: 0.2s;
        }
        .bg-engine-btn:hover, .bg-engine-btn.active {
            background: rgba(0, 210, 255, 0.15); border-color: var(--accent);
        }

        .setting-toggle-row {
            display: flex; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border); border-radius: 10px; padding: 4px; gap: 4px;
        }
        .setting-toggle-btn {
            flex: 1; background: none; border: none; color: rgba(255,255,255,0.6);
            padding: 8px; font-size: 0.7rem; border-radius: 6px; cursor: pointer;
            font-family: 'JetBrains Mono'; font-weight: 700; transition: 0.2s;
        }
        .setting-toggle-btn.active {
            background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent-glow);
        }

        /* --- CREDITS UI SPECIFIC --- */
        .credits-container { padding: 30px; display: flex; flex-direction: column; gap: 25px; }
        .credits-header { font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px; font-family: 'JetBrains Mono'; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .creator-row { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 12px 20px; border-radius: 16px; transition: 0.3s; }
        .creator-row:hover { background: rgba(255,255,255,0.05); border-color: var(--accent); transform: translateX(5px); }
        .creator-pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); background-size: cover; background-position: center; flex-shrink: 0; box-shadow: 0 0 10px var(--accent-glow); background-color: #111; }
        .creator-name { font-size: 0.95rem; font-weight: 500; letter-spacing: 0.5px; }

        /* --- GLOBAL ANNOUNCEMENT BANNER --- */
        #announcementBanner {
            position: fixed;
            top: -80px; 
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #000;
            padding: 12px 25px;
            border-radius: 0 0 16px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.85rem;
            z-index: 999999;
            box-shadow: 0 10px 40px var(--accent-glow);
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }
        #announcementBanner.active {
            top: 0;
        }
    </style>
</head>

        const damping = 0.98;
        let poolTime = 0;
        const pTextCanvas = document.createElement('canvas');
        const ptCtx = pTextCanvas.getContext('2d');

        function initPoolEngine() {
            pWidth = window.innerWidth; pHeight = window.innerHeight;
            poolCanvas.width = pWidth; poolCanvas.height = pHeight;
            pTextCanvas.width = pWidth; pTextCanvas.height = pHeight;
            cols = Math.floor(pWidth / res); rows = Math.floor(pHeight / res);
            buffer1 = new Float32Array(cols * rows).fill(0);
            buffer2 = new Float32Array(cols * rows).fill(0);
            
            ptCtx.fillStyle = '#003a4d'; ptCtx.fillRect(0, 0, pWidth, pHeight);
            ptCtx.strokeStyle = 'rgba(255,255,255,0.08)'; ptCtx.lineWidth = 1;
            for(let i=0; i<pWidth; i+=60) { ptCtx.strokeRect(i, 0, 0.5, pHeight); }

            let cx = Math.floor(x / res); let cy = Math.floor(y / res);
            let radius = strength > 500 ? 8 : 3;
            for(let i = -radius; i < radius; i++) {
                for(let j = -radius; j < radius; j++) {
                    let col = cx + i; let row = cy + j;
                    if (col >= 0 && col < cols && row >= 0 && row < rows) {
                        buffer1[row * cols + col] = strength;
                    }
                }
            }
        }

            for(let k=0; k<3; k++) {
                let rx = Math.floor(Math.random() * (cols - 2)) + 1;
                let ry = Math.floor(Math.random() * (rows - 2)) + 1;
                buffer1[ry * cols + rx] += Math.sin(poolTime * 0.4) * 2;

                let rowOffset = j * cols;
                for (let i = 1; i < cols - 1; i++) {
                    let idx = rowOffset + i;
                    buffer2[idx] = ((buffer1[idx - 1] + buffer1[idx + 1] + buffer1[idx - cols] + buffer1[idx + cols]) * 0.5) - buffer2[idx];

                }
            }
            let imgData = ptCtx.getImageData(0, 0, pWidth, pHeight);
            let outData = pCtx.createImageData(pWidth, pHeight);
            let pixels = imgData.data; let outPixels = outData.data;

            for (let y = 0; y < pHeight; y++) {
                let r = (y / res) | 0; let rowOffset = r * cols;
                for (let x = 0; x < pWidth; x++) {
                    let c = (x / res) | 0;
                    let rippleVal = buffer1[rowOffset + c];
                    let dataIdx = (y * pWidth + x) << 2;
                    let offset = (rippleVal * 0.8) | 0;
                    let fetchX = x + offset; let fetchY = y + offset;

                    if (fetchX < 0) fetchX = 0; else if (fetchX >= pWidth) fetchX = pWidth - 1;
                    if (fetchY < 0) fetchY = 0; else if (fetchY >= pHeight) fetchY = pHeight - 1;

                    let fetchIdx = (fetchY * pWidth + fetchX) << 2;
                    let shimmer = rippleVal > 0 ? rippleVal * 0.6 : 0;

                    outPixels[dataIdx] = pixels[fetchIdx] + shimmer;     
                    outPixels[dataIdx+1] = pixels[fetchIdx+1] + shimmer + (shimmer > 0 ? 4 : 0); 
                    outPixels[dataIdx+2] = pixels[fetchIdx+2] + shimmer + (shimmer > 0 ? 12 : 0);

                }
            }
            pCtx.putImageData(outData, 0, 0);
            let temp = buffer1; buffer1 = buffer2; buffer2 = temp;

                wtCtx.beginPath(); wtCtx.arc(Math.random() * wWidth, Math.random() * wHeight, Math.random() * 1.2, 0, Math.PI * 2); wtCtx.fill();
            }
            wtCtx.fillStyle = '#ffffff'; wtCtx.font = 'bold 220px serif';
            wtCtx.textAlign = 'center'; wtCtx.textBaseline = 'middle';
            wtCtx.fillText('W & CO', wWidth / 2, wHeight / 2);

            const tempImgData = wtCtx.getImageData(0, 0, wWidth, wHeight);
            sourceBuffer = new Uint32Array(tempImgData.data.buffer);
            outputData = wCtx.createImageData(wWidth, wHeight);
            outputPixels = new Uint32Array(outputData.data.buffer);
        }

        function runWarpPhysics() {
            const centerX = wWidth / 2; const centerY = wHeight / 2;
            const isInside = Math.abs(mouse.x - centerX) < boxWidth / 2 && Math.abs(mouse.y - centerY) < boxHeight / 2;
            
            if (holePos.x < -1000 && mouse.x > -1000) { holePos.x = mouse.x; holePos.y = mouse.y; }

            const targetInflation = isInside ? 1 : 0;
            currentInflation += (targetInflation - currentInflation) * (isInside ? 0.08 : 0.15);

            const followSpeed = isInside ? 0.12 : (currentInflation > 0.01 ? 0.25 : 1.0);
            holePos.x += (mouse.x - holePos.x) * followSpeed;
            holePos.y += (mouse.y - holePos.y) * followSpeed;

            if (currentInflation < 0.0001 && !isInside) {
                wCtx.drawImage(wTextCanvas, 0, 0);
                return;
            }

            const iSq = currentInflation * currentInflation;
            const lineLife = isInside ? Math.max(0, 1 - currentInflation * 1.4) : 0;
            const vScale = Math.max(iSq * iSq, 0.0001);
            const vRadius = voidRadius * currentInflation;

            for (let i = 0; i < wSize; i++) {
                const x = i % wWidth; const y = (i / wWidth) | 0;
                const dx = x - holePos.x; const dy = y - holePos.y;
                const distCheck = Math.sqrt(dx * dx + (dy / vScale) * (dy / vScale));
                const isLine = isInside && lineLife > 0 && Math.abs(dy) < (1.2 + lineLife * 2) && Math.abs(dx) < (wWidth * 0.35 * lineLife);

                if (distCheck < vRadius || isLine) {
                    outputPixels[i] = 0xFF050505; continue;
                }

                const rawDist = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx);
                const pull = Math.exp(-(Math.abs(dx) / 450) - (Math.abs(dy) / 30)) * currentInflation;
                const lensWarp = (voidRadius * 2.2) / Math.max(rawDist, 15) * currentInflation;

                const floatFx = x - Math.cos(angle) * (lensWarp * 45) - (dx * 0.3 * pull * currentInflation);
                const floatFy = y - Math.sin(angle) * (lensWarp * 45) + ((dy > 0 ? 1 : -1) * (20 * lineLife) * pull);

                const fx = (floatFx + 0.5) | 0; const fy = (floatFy + 0.5) | 0;
                
                if (fx >= 0 && fx < wWidth && fy >= 0 && fy < wHeight) {
                    outputPixels[i] = sourceBuffer[fy * wWidth + fx];
                } else {
                    outputPixels[i] = 0xFF000000;
                }
            }
            wCtx.putImageData(outputData, 0, 0);
        }

        /* ========================================================================
            CORE ENGINE LOOP RUNNER, MATRIX CHRONOMETER & OS LOGIC
            ======================================================================== */
        function updateSystemTimeMetrics() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            
            // Handle AM/PM logic
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            // Format hours for display based on format preference
            let displayHours = hours;
            if (timeFormat === '12h') {
                displayHours = hours % 12;
                displayHours = displayHours ? displayHours : 12; // the hour '0' should be '12'
            }
            
            const totalPassedSeconds = (hours * 3600) + (minutes * 60) + seconds;
            const totalDaySeconds = 86400; 
            const dayCompletionRatio = totalPassedSeconds / totalDaySeconds;
            
            const circumference = 113.097;
            const offset = circumference - (dayCompletionRatio * circumference);
            
            document.getElementById('chrono-progress-ring').style.strokeDashoffset = offset;
            
            // Update time display with hours and AM/PM
            const timeString = timeFormat === '12h' 
                ? `${displayHours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')} ${ampm}`
                : `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            
            document.getElementById('chrono-time-display').innerText = timeString;
            
            const daysMap = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
            document.getElementById('chrono-day-display').innerText = daysMap[now.getDay()];
        }

        function setTimeFormat(format) {
            timeFormat = format;
            localStorage.setItem('aura_time_format', format);
            
            document.querySelectorAll('.setting-toggle-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-format') === format) btn.classList.add('active');
            });
            
            updateSystemTimeMetrics();
        }

        function switchBackgroundEngine(engineName) {
            activeEngine = engineName;
            localStorage.setItem('aura_engine', engineName);

            document.querySelectorAll('.bg-canvas').forEach(canv => canv.classList.remove('active'));
            document.querySelectorAll('.bg-engine-btn').forEach(btn => btn.classList.remove('active'));

            if(engineName === 'pool') {
                document.getElementById('poolCanvas').classList.add('active');
                const btn = document.getElementById('btn-eng-pool');
                if(btn) btn.classList.add('active');
            } else {
                document.getElementById('warpCanvas').classList.add('active');
                const btn = document.getElementById('btn-eng-warp');
                if(btn) btn.classList.add('active');
            }
        }

        function animateOS() {
            if (activeEngine === 'pool') {
                runPoolPhysics();
            } else if (activeEngine === 'warp') {
                runWarpPhysics();
            }
            requestAnimationFrame(animateOS);
        }

        function initOS() {
            initPoolEngine();
            initWarpEngine();

            let savedEngine = localStorage.getItem('aura_engine');
            if (!savedEngine || savedEngine === "null" || savedEngine === "undefined") {
                savedEngine = 'pool';
            }
            
            const savedColor = localStorage.getItem('aura_accent') || '#00d2ff';
            timeFormat = localStorage.getItem('aura_time_format') || '24h';
            
            switchBackgroundEngine(savedEngine);
            setAccent(savedColor);

            updateSystemTimeMetrics();
            setInterval(updateSystemTimeMetrics, 1000);

            requestAnimationFrame(animateOS);
        }

            initPoolEngine();
            initWarpEngine();
        });

            const saved = localStorage.getItem(`aura_avatar_${key}`);
            if (saved) return saved;
            return DEFAULT_PFP[key] || '';

        function generateDesktopEnvironment() {
            const dockApps = document.getElementById('dock-apps');
            dockApps.innerHTML = ''; 

            APP_REGISTRY.forEach(app => {
                if (app.devOnly && !isDev) return;

                const node = document.createElement('div');
                node.className = 'dock-icon';
                node.title = app.label;
                
                if (app.type === 'core') {
                    node.setAttribute('onclick', `spawn('${app.name}')`);
                } else {
                    node.setAttribute('onclick', `spawnProxy('${app.name}', '${app.url}')`);
                }

                node.innerHTML = app.icon;
                dockApps.appendChild(node);
            });
        }

        function authenticate() {
            const rawInput = document.getElementById('pass-input').value;
            const inputVal = rawInput.toUpperCase().trim();
            const userDisplay = document.getElementById('user-display');
            
            if (DEV_KEYS[inputVal]) {
                activeUserKey = DEV_KEYS[inputVal]; 
                isDev = true;
                if(userDisplay) userDisplay.innerText = activeUserKey;
                document.getElementById('pfp-accent').style.cursor = 'pointer';
                document.getElementById('pfp-accent').style.backgroundImage = `url('${getDevAvatarUrl(activeUserKey)}')`;

                generateDesktopEnvironment();
                unlockOS();
            } else if (inputVal === 'WINKYGAMER098') {
                isDev = true;
                activeUserKey = 'winkygamer098';
                if(userDisplay) userDisplay.innerText = 'WINKYGAMER098';
                document.getElementById('pfp-accent').style.cursor = 'default';
                document.getElementById('pfp-accent').style.backgroundImage = `none`;
                
                generateDesktopEnvironment();
                unlockOS();
            } else if (inputVal === 'WINKY') {
                isDev = false;              
            
                let winkyId = sessionStorage.getItem('aura_winky_id');
                if (!winkyId) {
                    let nextNum = parseInt(localStorage.getItem('aura_next_winky_num') || '1');
                    if(nextNum > 13) nextNum = 1; 
                    winkyId = `winky_${nextNum}`;
                    sessionStorage.setItem('aura_winky_id', winkyId);
                    localStorage.setItem('aura_next_winky_num', nextNum + 1);
                }
                
                activeUserKey = winkyId;
                if(userDisplay) userDisplay.innerText = winkyId.toUpperCase();
                document.getElementById('pfp-accent').style.cursor = 'default';
                document.getElementById('pfp-accent').style.backgroundImage = `none`;
                
                generateDesktopEnvironment();
                unlockOS();
            } else {
                const err = document.getElementById('login-err');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 2000);
            }
        }

        function unlockOS() {
            document.getElementById('gatekeeper').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('desktop').style.opacity = '1';
                document.getElementById('desktop').style.pointerEvents = 'all';
                document.getElementById('taskbar').style.transform = 'translateX(-50%) translateY(0)';
            }, 1000);
        }

            if (isDev && input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgBase64 = e.target.result;
                    
                    document.getElementById('pfp-accent').style.backgroundImage = `url(${imgBase64})`;
                    localStorage.setItem(`aura_avatar_${activeUserKey}`, imgBase64);
                    
                    const b2PfpEl = document.getElementById('credits-pfp-b2');
                    const c3PfpEl = document.getElementById('credits-pfp-c3');
                    if (activeUserKey === 'Hiring' && b2PfpEl) b2PfpEl.style.backgroundImage = `url(${imgBase64})`;
                    if (activeUserKey === 'winky_is_tuff' && c3PfpEl) c3PfpEl.style.backgroundImage = `url(${imgBase64})`;
                };
                reader.readAsDataURL(input.files[0]);
            }

            const win = document.getElementById(id);
            if (win) {
                const iframe = win.querySelector('iframe');
                if (iframe) {
                    iframe.src = iframe.src;
                }
            }
        }

        function spawnProxy(name, url) {
            const lowerName = name.toLowerCase();
            const id = 'win-' + lowerName;
            if (document.getElementById(id)) { focusWin(id); return; }
            const win = document.createElement('div');
            win.id = id; win.className = 'win';
            win.style.display = 'flex';
            win.style.width = '850px'; win.style.height = '550px';
            win.style.left = '100px'; win.style.top = '80px';
            win.style.zIndex = ++zIdx;
            win.innerHTML = `
                <div class="win-bar" onmousedown="dragStart(event, '${id}')">

                    </div>

                <div class="win-body"><iframe src="${url}"></iframe></div>
            `;
            document.body.appendChild(win);
        }

        window.sendBroadcast = async () => {
            const input = document.getElementById('adminBroadcastInput');
            const msg = input.value;
            if(msg.trim() !== "" && window.db) {
                try {
                    await window.setDoc(window.doc(window.db, "settings", "announcement"), { text: msg, updatedAt: window.serverTimestamp() }, { merge: true });
                    input.value = "";
                } catch (e) { 
                    alert("Firebase Error: Make sure your Firestore rules allow writes."); 
                }
            }
        };

        window.clearBroadcast = async () => {
            if(window.db) {
                await window.setDoc(window.doc(window.db, "settings", "announcement"), { text: "" }, { merge: true });
            }
        };

            win.style.left = '200px'; win.style.top = '150px';

                ctrlButtons = `<button class="win-btn btn-close" onclick="document.getElementById('${id}').remove()"></button>`;

                    adminPanel = `
                    <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:16px;">

                        </div>
                    </div>`;
                }

                body = `<div style="padding:22px; overflow-y: auto; max-height: 100%;">
                    <p style="font-size:0.65rem; opacity:0.5; margin-bottom:8px; letter-spacing:1px;">CORE ENGINE MATRIX</p>
                    <div class="bg-scroll-area">
                        <button id="btn-eng-pool" class="bg-engine-btn ${activeEngine==='pool'?'active':''}" onclick="switchBackgroundEngine('pool')">

                        <div class="setting-toggle-row">

                            <button class="setting-toggle-btn ${timeFormat==='12h'?'active':''}" data-format="12h" onclick="setTimeFormat('12h')">STANDARD (12H)</button>

                        <input type="color" value="${localStorage.getItem('aura_accent') || '#00d2ff'}" onchange="setAccent(this.value)" style="width:100%; height:28px; background:none; border:none; cursor:pointer; margin-top:5px;">

                    { name: 'BSS', url: 'https://dddatt.github.io/bss/', img: 'https://placehold.co/250x140/1a1f2b/00d2ff?text=BSS' },

                    { name: 'Eaglercraft 1.20', url: 'https://eaglercraft.dev/clients/EaglyMC%201.20%20JS/index.html', img: 'https://placehold.co/250x140/1a1f2b/00d2ff?text=Eaglercraft+1.20' },
                    { name: 'Eaglercraft 1.8.8', url: 'https://eaglercraft.dev/clients/Release%201.8.8%20JS/index.html', img: 'https://placehold.co/250x140/1a1f2b/00d2ff?text=Eaglercraft+1.8.8' },
                    { name: 'Curved Moccasin', url: 'https://curved-moccasin-rdfdf1xksq.edgeone.app/', img: 'https://www.google.com/imgres?q=drivemad%20image&imgurl=https%3A%2F%2Fdrivinggames.io%2Fcache%2Fdata%2Fimage%2Fgame%2Fdrive-mad1-f375x375.webp&imgrefurl=https%3A%2F%2Fdrivinggames.io%2F&docid=NmTG3_qrqs-h3M&tbnid=QnHtVk3q6wIIzM&vet=12ahUKEwi3tp3R4MiUAxVsk4kEHZMSOuoQnPAOegQIGxAB..i&w=375&h=375&hcb=2&ved=2ahUKEwi3tp3R4MiUAxVsk4kEHZMSOuoQnPAOegQIGxAB' }
                ];

                let gamesHTML = gamesList.map(g => `
                    <div class="game-card" onclick="spawnProxy('${g.name.replace(/ /g, '_')}', '${g.url}')" onmouseover="this.style.borderColor='var(--accent)'; this.style.transform='translateY(-2px)';" onmouseout="this.style.borderColor='var(--border)'; this.style.transform='translateY(0)';" style="background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 14px; padding: 12px; cursor: pointer; transition: all 0.3s ease; text-align: center;">

                body = `<div style="padding: 22px; height: 100%; overflow-y: auto;">

                ctrlButtons = `<button class="win-btn btn-close" onclick="document.getElementById('${id}').remove()"></button>`;
                
                const omieAvatar = getDevAvatarUrl('');

                body = `<div class="credits-container">

                        <div id="credits-pfp-b2" class="creator-pfp" style="background-image: url('${omieAvatar}');"></div>

                        <div id="credits-pfp-c3" class="creator-pfp" style="background-image: url('${balisticAvatar}');"></div>
                        <div class="creator-name">winky_is_tuff</div>

                </div>`;
            } else {
                ctrlButtons = `
                    <button class="win-btn btn-refresh" onclick="refreshWin('${id}')"></button>
                    <button class="win-btn btn-close" onclick="document.getElementById('${id}').remove()"></button>

            win.innerHTML = 
                `<div class="win-bar" onmousedown="dragStart(event, '${id}')">
                    <span style="font-size:0.7rem; font-weight:700;">${app.toUpperCase()}</span>

                </div>
                <div class="win-body">${body}</div>`

            document.body.appendChild(win);
        }

        function setAccent(color) {
            document.documentElement.style.setProperty('--accent', color);
            localStorage.setItem('aura_accent', color);
        }

        function dragStart(e, id) {
            const el = document.getElementById(id);
            focusWin(id);
            if (el.classList.contains('maximized')) return;
            let sx = e.clientX - el.offsetLeft;
            let sy = e.clientY - el.offsetTop;
            const move = (ev) => { el.style.left = (ev.clientX - sx) + 'px'; el.style.top = (ev.clientY - sy) + 'px'; };
            const stop = () => window.removeEventListener('mousemove', move);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
        }

        function maxWin(id) { document.getElementById(id).classList.toggle('maximized'); }
        function focusWin(id) { document.getElementById(id).style.zIndex = ++zIdx; }
    </script>
